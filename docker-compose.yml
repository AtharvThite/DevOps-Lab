services:
  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: devops-lab-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  # ── Backend (Node + Express) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-lab-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - sonarqube
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/devops_automation
      FRONTEND_ORIGIN: http://localhost:3000
      SIMULATE_PIPELINE: "false"
      SIMULATE_SONAR_FAIL: "false"
      SONAR_FAIL_PATTERN: "QUALITY GATE STATUS: FAILED"
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: "${SONAR_TOKEN:-}"
      SONAR_COMMAND: bash ./infra/scripts/run_sonar.sh
      TERRAFORM_INIT_COMMAND: bash ./infra/scripts/run_terraform.sh init
      TERRAFORM_APPLY_COMMAND: bash ./infra/scripts/run_terraform.sh apply
      ANSIBLE_COMMAND: bash ./infra/scripts/run_ansible.sh
      DEPLOYMENT_TARGET: lxd
      LXD_COMMAND: bash ./infra/scripts/deploy_lxd.sh
      DEPLOYED_APP_URL: "${DEPLOYED_APP_URL:-http://10.100.219.50:3000/}"
      LXD_CONTAINER_NAME: "${LXD_CONTAINER_NAME:-devops-lab-app}"
      LXD_PROFILE_NAME: "${LXD_PROFILE_NAME:-devops-lab-profile}"
      LXD_IMAGE: "${LXD_IMAGE:-ubuntu:22.04}"
      LXD_STORAGE_POOL: "${LXD_STORAGE_POOL:-default}"
      LXD_NETWORK: "${LXD_NETWORK:-lxdbr0}"
      LXD_CPU: "${LXD_CPU:-2}"
      LXD_MEMORY: "${LXD_MEMORY:-2GB}"
      APP_DIR: "${APP_DIR:-/opt/devops-lab}"
      REPO_ROOT: /repo
      LXD_GROUP_REEXEC: "1"
      NODE_ENV: production
    security_opt:
      - label=disable
    volumes:
      - backend_uploads:/app/uploads
      # Mount the entire repo so sonar-scanner can scan source files
      - ./:/repo:rw,Z
      # Mount the LXD socket from the host proxy
      - ./lxd-proxy.sock:/var/snap/lxd/common/lxd/unix.socket:rw
      # Share terraform state across rebuilds
      - terraform_state:/app/infra/terraform

  # ── Frontend (React → Nginx) ─────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: devops-lab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── SonarQube ─────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.6-community
    container_name: devops-lab-sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  # ── SonarQube Postgres DB ────────────────────────────────
  sonarqube-db:
    image: postgres:15
    container_name: devops-lab-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  # ── Jenkins ────────────────────────────────────────────────
  jenkins:
    build:
      context: ./infrastructure/jenkins
      dockerfile: Dockerfile
    container_name: devops-lab-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    user: root
    environment:
      # Pass through environment variables similar to backend
      SONAR_HOST_URL: http://sonarqube:9000
      DEPLOYMENT_TARGET: lxd
      SONAR_TOKEN: "${SONAR_TOKEN:-}"
      LXD_CONTAINER_NAME: "${LXD_CONTAINER_NAME:-devops-lab-app-jenkins}"
      REPO_ROOT: /repo
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount the entire repo to /repo
      - ./:/repo:rw,Z
      # Mount the LXD socket from the host proxy
      - ./lxd-proxy.sock:/var/snap/lxd/common/lxd/unix.socket:rw
      # Share terraform state across rebuilds
      - terraform_state:/app/infra/terraform
    security_opt:
      - label=disable
    privileged: true

volumes:
  jenkins_home:
  mongo_data:
  backend_uploads:
  terraform_state:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgresql_data:
  lxd_socket_dir:
